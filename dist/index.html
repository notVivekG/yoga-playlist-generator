<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Yoga Course</title>
  <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-4 py-2 bg-black shadow-md">

  <div class="flex items-center space-x-3">
    <h1 class="text-2xl font-bold text-white">AI Yoga Course</h1>
    <h3 id="yt"></h3>
  </div>

  <ul class="hidden md:flex justify-center items-center space-x-8">
    <li><button class="hover:text-blue-500 hover:bg-white text-white font-semibold px-4 py-2 rounded-md">HOME</button></li>
    <li><button class="hover:text-blue-500 hover:bg-white text-white font-semibold px-4 py-2 rounded-md">About us</button></li>
    <li><button class="hover:text-blue-500 hover:bg-white text-white font-semibold px-4 py-2 rounded-md">Contact us</button></li>
  </ul>

  <button class="hover:text-blue-500 hover:bg-white text-white px-4 py-2 rounded-md font-semibold">Log in</button>
</nav>

<!-- HEADER -->
<section id="header" class="flex flex-col items-center text-center h-screen px-4 pt-5">

  <div class="inline bg-purple-50 px-7 py-2 mb-16 mt-8 text-xl font-semibold rounded-full shadow-md">
    <span class="text-purple-500 bg-linear-to-r from-purple-400 to-teal-300 bg-clip-text">
      ✨ AI-Powered Yoga Courses
    </span>
  </div>

  <h1 class="text-5xl md:text-8xl font-bold mb-10 bg-linear-to-r from-purple-400 to-teal-300 bg-clip-text text-transparent">
    Your Personal Yoga Journey
    <br>Starts Here
  </h1>

  <p class="text-gray-400 text-2xl leading-relaxed mb-10">
    Generate personalized yoga courses tailored to your level.<br>
    Each day brings new lessons from expert instructors...
  </p>

  <!-- USER INPUT (ADDED) -->
  <input
    id="userInput"
    type="text"
    placeholder="Describe your problem (stress, anxiety, tension...)"
    class="m-4 px-4 py-4 w-96 border rounded-lg shadow-md"
  />

  <button
    onclick="getYoga()"
    class="w-64 px-6 py-3 bg-purple-500 text-black rounded-lg font-semibold hover:bg-purple-700 border-2 border-purple-700 shadow-md"
  >
    Generate Yoga Playlist
  </button>

  <!-- RESULT -->
  <div id="result" class="mt-8 text-lg text-gray-700"></div>

</section>

<!-- JS -->
<script>
async function getYoga() {
  const text = document.getElementById("userInput").value;

  if (!text) {
    alert("Please enter your problem");
    return;
  }

  const BACKEND_URL = "https://yoga-playlist-backend.onrender.com/recommend";
  const response = await fetch(BACKEND_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_text: text })
  });

  const data = await response.json();

  if (data.length === 0) {
    document.getElementById("result").innerHTML =
      "<p class='text-red-500'>No recommendations found.</p>";
    return;
  }

  let output = `
    <h3 class="font-bold text-2xl mb-4">Recommended Yoga Playlist</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
  `;

  data.forEach(item => {
    const videoId = item.yt_link.split("youtu.be/")[1]?.split("?")[0];

    output += `
      <div class="bg-white rounded-xl shadow-md p-4">
        <h4 class="font-semibold text-lg mb-2">${item.yoga_type}</h4>
        <iframe
          class="w-full h-56 rounded-lg"
          src="https://www.youtube.com/embed/${videoId}"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    `;
  });

  output += "</div>";
  document.getElementById("result").innerHTML = output;
}
</script>


</body>
</html>
