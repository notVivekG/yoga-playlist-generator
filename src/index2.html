<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Yoga Course</title>
    <link href="./output.css" rel="stylesheet">
</head>

<body class="bg-slate-800 text-white p-6 text-center">
    <div class="flex flex-col gap-1 p-3 bg-white text-black">
        <h1 class="text-3xl font-semibold">Choose Your Course Length</h1>
        <p class="text-slate-600 text-base">Select the duration that fits your goals</p>
        </br>
        <div class="group relative transition flex flex-col justify-around items-start m-3 p-5 rounded-lg border-3 h-45 border-purple-300 hover:border-purple-600 hover:bg-purple-100">
            <span class="absolute top-10 right-10 text-green-500 text-xl opacity-0 group-hover:opacity-100 transition-opacity">
                &#x2714;
            </span>
            <div class="text-2xl font-semibold ">Beginner</div>
            <div class="text-base rounded-2xl bg-sky-300 px-2 font-medium text-white ">⏱️7-days</div>
            <div class="text-sm text-gray-500 font-medium">Perfect for starting your Yoga Journey</div>
            <div class="text-sm font-bold text-pink-500">7 Lessons</div>
        </div>
        <div class="group relative transition flex flex-col justify-around items-start m-3 p-5 rounded-lg border-3 h-45 border-purple-300 hover:border-purple-600 hover:bg-purple-100">
            <span class="absolute top-10 right-10 text-green-500 text-xl opacity-0 group-hover:opacity-100 transition-opacity">
                &#x2714;
            </span>
            <div class="text-2xl font-semibold ">Intermediate</div>
            <div class="text-base rounded-2xl bg-sky-300 px-2 font-medium text-white ">⏱️14-days</div>
            <div class="text-sm text-gray-500 font-medium">Build on your foundation</div>
            <div class="text-sm font-bold text-pink-500">14 Lessons</div>
        </div>
        <div class="group relative transition flex flex-col justify-around items-start m-3 p-5 rounded-lg border-3 h-45 border-purple-300 hover:border-purple-600 hover:bg-purple-100">
            <span class="absolute top-10 right-10 text-green-500 text-xl opacity-0 group-hover:opacity-100 transition-opacity">
                &#x2714;
            </span>
            <div class="text-2xl font-semibold ">Advanced</div>
            <div class="text-base rounded-2xl bg-sky-300 px-2 font-medium text-white ">⏱️30-days</div>
            <div class="text-sm text-gray-500 font-medium">Master your practice</div>
            <div class="text-sm font-bold text-pink-500">30 Lessons</div>
        </div>
    </div>
</body>

</html>
